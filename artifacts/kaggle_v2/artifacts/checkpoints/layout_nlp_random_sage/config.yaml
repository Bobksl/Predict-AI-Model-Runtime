  lr: 0.001
  weight_decay: 0.0
run_name: layout_nlp_random_sage
seed: 0
shards:
  enabled: true
  pool: 2000
  root: /kaggle/working/config_shards
train:
  early_stop_patience: 10
  max_epochs: 80
